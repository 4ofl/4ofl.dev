<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>4ofl | Aby</title>
  <meta name="description" content="4's project space." />
  <meta name="theme-color" content="#0b0907" />

  <meta property="og:title" content="4ofl.dev" />
  <meta property="og:description" content="Projects and experiments by 4." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://4ofl.dev" />
  <meta property="og:site_name" content="4ofl.dev" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="4ofl.dev" />
  <meta name="twitter:description" content="Projects and experiments by 4." />

  <style>
    :root {
      --bg: #0b0907;
      --text: #f5eee4;
      --muted: #a89b8b;
      --line: rgba(245, 238, 228, 0.14);
      --button: #f5eee4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(245, 238, 228, 0.06), transparent 28%),
        linear-gradient(135deg, #0b0907 0%, #120d09 48%, #060504 100%);
    }

    .page {
      width: min(1040px, calc(100% - 40px));
      min-height: 100svh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    nav {
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 14px;
      flex-shrink: 0;
    }

    .brand {
      color: var(--text);
      font-weight: 750;
      letter-spacing: -0.04em;
    }

    .links {
      display: flex;
      gap: 18px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .links a {
      color: var(--muted);
    }

    .links a:hover {
      color: var(--text);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 48px 0 76px;
    }

    .hero {
      width: 100%;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 9vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: -0.085em;
      font-weight: 820;
    }

    p {
      margin: 28px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-size: clamp(1rem, 1.7vw, 1.2rem);
      line-height: 1.75;
    }

    .projects {
      margin-top: 48px;
      display: grid;
      gap: 18px;
      max-width: 720px;
    }

    .project {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 20px 0;
      border-top: 1px solid var(--line);
    }

    .project:last-child {
      border-bottom: 1px solid var(--line);
    }

    .project h2 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: -0.03em;
    }

    .project p {
      margin: 8px 0 0;
      font-size: 0.96rem;
      line-height: 1.6;
    }

    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 15px;
      border-radius: 999px;
      border: 1px solid var(--button);
      background: var(--button);
      color: var(--bg);
      font-size: 14px;
      font-weight: 720;
      white-space: nowrap;
    }

    footer {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(245, 238, 228, 0.42);
      font-size: 13px;
      flex-shrink: 0;
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 28px, 1040px);
      }

      nav {
        height: 64px;
      }

      .links {
        gap: 12px;
      }

      main {
        padding: 52px 0 48px;
      }

      h1 {
        font-size: clamp(2.7rem, 15vw, 4.7rem);
      }

      .project {
        grid-template-columns: 1fr;
      }

      .button {
        width: fit-content;
      }

      footer {
        height: auto;
        padding: 22px 0;
        gap: 10px;
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <nav>
      <div class="brand">4ofl.dev</div>

      <div class="links">
        <a href="https://4ofl.dev/github" target="_blank" rel="noreferrer">GitHub</a>
        <a href="https://4ofl.dev/linkedin" target="_blank" rel="noreferrer">LinkedIn</a>
        <a href="mailto:aby@4ofl.dev">Mail</a>
      </div>
    </nav>

    <main>
      <section class="hero">
        <h1>4ofl.dev</h1>

        <p>
          A small space for projects, experiments, and things I am building while learning.
        </p>

        <div class="projects">
          <article class="project">
            <div>
              <h2>CiteCamp</h2>
              <p>A RAG-based assistant for querying curated academic documents.</p>
            </div>

            <a class="button" href="https://citecamp.4ofl.dev">
              Open
            </a>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <span>Aby Mathew</span>
      <span>Kerala, India</span>
    </footer>
  </div>
</body>
</html>
