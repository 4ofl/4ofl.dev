<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <title>404 | 4ofl.dev</title>
  <meta name="description" content="Page not found." />
  <meta name="theme-color" content="#0b0907" />

  <style>
    :root {
      --bg: #0b0907;
      --text: #f5eee4;
      --muted: #a89b8b;
      --button: #f5eee4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(245, 238, 228, 0.06), transparent 28%),
        linear-gradient(135deg, #0b0907 0%, #120d09 48%, #060504 100%);
    }

    main {
      width: min(760px, calc(100% - 40px));
      height: 100svh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .code {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 16vw, 8rem);
      line-height: 0.9;
      letter-spacing: -0.085em;
      font-weight: 820;
    }

    p {
      margin: 28px 0 0;
      max-width: 520px;
      color: var(--muted);
      font-size: clamp(1rem, 1.7vw, 1.15rem);
      line-height: 1.7;
    }

    a {
      margin-top: 34px;
      width: fit-content;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--button);
      color: var(--bg);
      text-decoration: none;
      font-size: 14px;
      font-weight: 720;
    }

    @media (max-width: 680px) {
      main {
        width: min(100% - 28px, 760px);
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="code">404</div>
    <h1>lost.</h1>

    <p>
      This page does not exist here.
    </p>

    <a href="/">Home</a>
  </main>
</body>
</html>
